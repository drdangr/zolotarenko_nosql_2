<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>arXiv Embedding Map · SPECTER2 + UMAP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="./map_data.js"></script>
  <style>
    html, body, #root { height: 100%; }
    body { background: #0b0f1a; }
    .plot-wrap .modebar { opacity: 0.35; }
  </style>
</head>
<body class="text-slate-200">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const PALETTE = [
      "#60a5fa", "#f472b6", "#34d399", "#fbbf24", "#a78bfa", "#fb923c",
      "#22d3ee", "#f87171", "#a3e635", "#e879f9", "#2dd4bf", "#94a3b8",
    ];

    const CATEGORY_NAMES = {
      "cs": "Computer Science — інформатика",
      "math": "Mathematics — математика",
      "cond-mat": "Condensed Matter — фізика конденсованого стану",
      "astro-ph": "Astrophysics — астрофізика",
      "physics": "Physics — загальна фізика",
      "hep-ph": "High Energy Physics, Phenomenology — фізика високих енергій (феноменологія)",
      "quant-ph": "Quantum Physics — квантова фізика",
      "hep-th": "High Energy Physics, Theory — фізика високих енергій (теорія)",
      "eess": "Electrical Engineering & Systems Science — електротехніка та системотехніка",
      "gr-qc": "General Relativity & Quantum Cosmology — загальна теорія відносності та квантова космологія",
      "stat": "Statistics — статистика",
      "nlin": "Nonlinear Sciences — нелінійна динаміка",
      "hep-ex": "High Energy Physics, Experiment — фізика високих енергій (експеримент)",
      "nucl-th": "Nuclear Theory — ядерна теорія",
      "nucl-ex": "Nuclear Experiment — ядерний експеримент",
      "math-ph": "Mathematical Physics — математична фізика",
      "q-bio": "Quantitative Biology — кількісна біологія",
      "q-fin": "Quantitative Finance — кількісні фінанси",
      "econ": "Economics — економіка",
      "other": "Інші категорії arXiv",
    };
    const describe = (g) => CATEGORY_NAMES[g] || g;
    const majorGroup = (cat) => (cat.includes(".") ? cat.split(".")[0] : cat);

    const METHODS = [
      { id: "lexical", label: "Лексичний", short: "BM25 — точний збіг слів",
        tip: "BM25 — лексичний (sparse) пошук за точним збігом слів: частота терміна × зворотна частота в документах (TF-IDF) з нормуванням на довжину. Сильний на термінах, абревіатурах, іменах авторів; не розуміє синонімів." },
      { id: "semantic", label: "Семантичний", short: "SPECTER2 + Pinecone — за змістом",
        tip: "Семантичний (dense) пошук: запит кодується моделлю SPECTER2 у 768-вимірний вектор, далі — пошук найближчих за cosine у Pinecone. Сильний на перефразуваннях і синонімах; може промахуватися на точних абревіатурах." },
      { id: "hybrid", label: "Гібридний", short: "BM25 + вектор через RRF",
        tip: "Гібрид: об'єднує ранжування BM25 і векторного пошуку через Reciprocal Rank Fusion (RRF, k=60) — працює з рангами, а не зі скорами, і бере найкраще від обох методів." },
    ];

    function buildGroups(data) {
      const counts = {};
      data.forEach(d => { const g = majorGroup(d.category); counts[g] = (counts[g] || 0) + 1; });
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 11).map(e => e[0]);
      const topSet = new Set(top);
      const colorOf = {};
      top.forEach((g, i) => { colorOf[g] = PALETTE[i]; });
      colorOf["other"] = "#475569";
      return { order: [...top, "other"], topSet, colorOf, counts };
    }

    function App() {
      const data = window.MAP_DATA || [];
      const plotRef = useRef(null);
      const [query, setQuery] = useState("");
      const [method, setMethod] = useState("semantic");
      const [topK, setTopK] = useState(20);
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");
      const [hidden, setHidden] = useState(() => new Set());
      const [hoverMethod, setHoverMethod] = useState(null);
      const [hoverGroup, setHoverGroup] = useState(null);
      const [expanded, setExpanded] = useState(null);

      const groups = useMemo(() => buildGroups(data), [data]);
      const [yMin, yMax] = useMemo(() => {
        const ys = data.map(d => d.year); return [Math.min(...ys), Math.max(...ys)];
      }, [data]);
      const [yearLo, setYearLo] = useState(yMin);
      const [yearHi, setYearHi] = useState(yMax);

      const yearFiltered = useMemo(
        () => data.filter(d => d.year >= yearLo && d.year <= yearHi),
        [data, yearLo, yearHi]
      );

      // Множина id результатів пошуку + ранг для підпису на карті.
      const resultRank = useMemo(() => {
        const m = {}; results.forEach(r => { m[r.id] = r.rank; }); return m;
      }, [results]);

      async function runSearch() {
        const q = query.trim();
        if (!q) { setResults([]); setError(""); return; }
        setLoading(true); setError("");
        try {
          const resp = await fetch("/api/search", {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: q, method, k: topK }),
          });
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const json = await resp.json();
          setResults(json.results || []);
        } catch (e) {
          setError("Бекенд недоступний. Запустіть: python -P app.py  (порт 5000)");
          setResults([]);
        } finally { setLoading(false); }
      }

      useEffect(() => {
        if (!plotRef.current) return;
        const hasRes = results.length > 0;

        const byGroup = {};
        groups.order.forEach(g => { byGroup[g] = { x: [], y: [], text: [], match: [] }; });
        yearFiltered.forEach(d => {
          const g = groups.topSet.has(majorGroup(d.category)) ? majorGroup(d.category) : "other";
          const b = byGroup[g];
          const rank = resultRank[d.id];
          b.x.push(d.x); b.y.push(d.y);
          b.text.push(`<b>${d.title}</b><br>${d.category} · ${d.year}` + (rank ? `<br>★ результат #${rank}` : ""));
          b.match.push(!!rank);
        });

        const traces = groups.order.map(g => {
          const b = byGroup[g];
          const colors = b.match.map(m => (hasRes ? (m ? "#ffffff" : groups.colorOf[g]) : groups.colorOf[g]));
          const sizes = b.match.map(m => (hasRes && m ? 11 : 4));
          const opac = hasRes ? b.match.map(m => (m ? 1 : 0.1)) : 0.72;
          return {
            type: "scattergl", mode: "markers", name: g,
            x: b.x, y: b.y, text: b.text, hoverinfo: "text",
            visible: hidden.has(g) ? "legendonly" : true,
            marker: {
              size: sizes, color: colors, opacity: opac,
              line: hasRes ? { width: b.match.map(m => (m ? 1.5 : 0)), color: "#0b0f1a" } : { width: 0 },
            },
          };
        });

        const layout = {
          paper_bgcolor: "#0b0f1a", plot_bgcolor: "#0b0f1a",
          margin: { l: 10, r: 10, t: 10, b: 10 },
          xaxis: { visible: false, scaleanchor: "y" }, yaxis: { visible: false },
          showlegend: false, hovermode: "closest", font: { color: "#cbd5e1" }, dragmode: "pan",
        };
        Plotly.react(plotRef.current, traces, layout, {
          displayModeBar: true, scrollZoom: true, responsive: true,
          modeBarButtonsToRemove: ["select2d", "lasso2d", "autoScale2d"], displaylogo: false,
        }).then(() => Plotly.Plots.resize(plotRef.current));
      }, [yearFiltered, results, resultRank, groups, hidden]);

      useEffect(() => {
        const onResize = () => plotRef.current && Plotly.Plots.resize(plotRef.current);
        window.addEventListener("resize", onResize);
        return () => window.removeEventListener("resize", onResize);
      }, []);

      const toggleGroup = (g) => setHidden(prev => {
        const n = new Set(prev); n.has(g) ? n.delete(g) : n.add(g); return n;
      });
      const onLo = (v) => setYearLo(Math.min(+v, yearHi));
      const onHi = (v) => setYearHi(Math.max(+v, yearLo));

      return (
        <div className="flex h-screen w-full overflow-hidden">
          <aside className="w-96 shrink-0 border-r border-slate-800 bg-slate-900/60 backdrop-blur p-5 flex flex-col gap-4 overflow-y-auto h-screen">
            <div>
              <h1 className="text-xl font-bold text-white tracking-tight">arXiv Embedding Map</h1>
              <p className="text-xs text-slate-400 mt-1">
                {data.length.toLocaleString()} статей · SPECTER2 (768d) → UMAP (cosine, 2D)
              </p>
            </div>

            {/* Пошук */}
            <div className="rounded-xl bg-slate-800/50 border border-slate-700 p-3 flex flex-col gap-3">
              <div className="flex gap-2">
                <input
                  value={query} onChange={e => setQuery(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && runSearch()}
                  placeholder="введіть запит…"
                  className="flex-1 rounded-lg bg-slate-900 border border-slate-700 px-3 py-2 text-sm
                             text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-sky-500"
                />
                <button onClick={runSearch} disabled={loading}
                  className="rounded-lg bg-sky-600 hover:bg-sky-500 disabled:opacity-50 px-3 py-2 text-sm font-medium text-white">
                  {loading ? "…" : "Шукати"}
                </button>
              </div>

              {/* Сегментований перемикач методу з hover-поясненнями */}
              <div className="grid grid-cols-3 gap-1 bg-slate-900 rounded-lg p-1">
                {METHODS.map((m, i) => (
                  <div key={m.id} className="relative"
                       onMouseEnter={() => setHoverMethod(m.id)} onMouseLeave={() => setHoverMethod(null)}>
                    <button onClick={() => setMethod(m.id)}
                      className={`w-full text-xs py-1.5 rounded-md transition ${
                        method === m.id ? "bg-sky-600 text-white font-medium" : "text-slate-300 hover:bg-slate-800"}`}>
                      {m.label}
                    </button>
                    {hoverMethod === m.id && (
                      <div className={`pointer-events-none absolute top-full mt-1 z-30
                                       w-72 rounded-md bg-slate-950 border border-slate-700 px-3 py-2
                                       text-[11px] leading-snug text-slate-200 shadow-xl
                                       ${i === 0 ? "left-0" : i === 2 ? "right-0" : "left-1/2 -translate-x-1/2"}`}>
                        <span className="font-semibold text-sky-300">{m.label}.</span> {m.tip}
                      </div>
                    )}
                  </div>
                ))}
              </div>
              <p className="text-[11px] text-slate-500 -mt-1">
                {METHODS.find(m => m.id === method).short}
              </p>

              <div className="flex items-center gap-2 text-xs text-slate-400">
                <span>результатів:</span>
                {[10, 20, 50].map(n => (
                  <button key={n} onClick={() => setTopK(n)}
                    className={`px-2 py-0.5 rounded ${topK === n ? "bg-slate-700 text-white" : "hover:bg-slate-800"}`}>
                    {n}
                  </button>
                ))}
              </div>
              {error && <p className="text-[11px] text-amber-400">{error}</p>}
            </div>

            {/* Фільтр за роком */}
            <div>
              <label className="text-xs font-medium text-slate-300">Роки публікації</label>
              <div className="mt-1 text-sm text-slate-100 font-mono">{yearLo} – {yearHi}</div>
              <div className="mt-2 flex flex-col gap-1">
                <input type="range" min={yMin} max={yMax} value={yearLo} onChange={e => onLo(e.target.value)} className="w-full accent-sky-500" />
                <input type="range" min={yMin} max={yMax} value={yearHi} onChange={e => onHi(e.target.value)} className="w-full accent-sky-500" />
              </div>
              <p className="text-[11px] text-slate-500 mt-1">показано {yearFiltered.length.toLocaleString()} точок</p>
            </div>

            {/* Результати пошуку АБО легенда */}
            {results.length > 0 ? (
              <div className="flex-1 min-h-0 flex flex-col">
                <div className="flex items-center justify-between mb-2">
                  <p className="text-xs font-medium text-slate-300">Результати ({method})</p>
                  <button onClick={() => { setResults([]); setQuery(""); }} className="text-[11px] text-slate-500 hover:text-slate-300">очистити ✕</button>
                </div>
                <div className="flex-1 overflow-y-auto flex flex-col gap-1 pr-1">
                  {results.map(r => {
                    const open = expanded === r.id;
                    const absUrl = `https://arxiv.org/abs/${r.arxiv_id}`;
                    const pdfUrl = `https://arxiv.org/pdf/${r.arxiv_id}`;
                    return (
                      <div key={r.id} className="rounded-md bg-slate-800/60 border border-slate-700/60">
                        <button onClick={() => setExpanded(open ? null : r.id)} className="w-full text-left px-2.5 py-1.5">
                          <div className="flex gap-2 text-[11px]">
                            <span className="text-sky-400 font-mono">#{r.rank}</span>
                            <span className="text-slate-600">{open ? "▾" : "▸"}</span>
                            <span className="ml-auto text-slate-500">{r.category} · {r.year}</span>
                          </div>
                          <p className="text-xs text-slate-200 leading-snug mt-0.5">{r.title}</p>
                        </button>
                        {open && (
                          <div className="px-2.5 pb-2 pt-1 border-t border-slate-700/60 flex flex-col gap-1.5">
                            {r.authors && <p className="text-[11px] text-slate-400 italic">{r.authors}</p>}
                            <p className="text-[11px] text-slate-300 leading-relaxed max-h-40 overflow-y-auto">{r.abstract}</p>
                            <div className="flex gap-2 pt-0.5">
                              <a href={absUrl} target="_blank" rel="noopener noreferrer"
                                 className="text-[11px] px-2 py-1 rounded bg-sky-600 hover:bg-sky-500 text-white">↗ arXiv</a>
                              <a href={pdfUrl} target="_blank" rel="noopener noreferrer"
                                 className="text-[11px] px-2 py-1 rounded bg-slate-700 hover:bg-slate-600 text-slate-100">PDF</a>
                              <span className="ml-auto text-[10px] text-slate-600 self-center font-mono">{r.arxiv_id}</span>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            ) : (
              <div className="flex-1">
                <p className="text-xs font-medium text-slate-300 mb-2">
                  Родини arXiv <span className="text-slate-500">(клік — сховати, наведення — розшифровка)</span>
                </p>
                <div className="flex flex-col gap-1">
                  {groups.order.map(g => (
                    <div key={g} className="relative"
                         onMouseEnter={() => setHoverGroup(g)} onMouseLeave={() => setHoverGroup(null)}>
                      <button onClick={() => toggleGroup(g)}
                        className={`w-full flex items-center gap-2 px-2 py-1 rounded-md text-left text-xs transition
                                    ${hidden.has(g) ? "opacity-35" : "hover:bg-slate-800"}`}>
                        <span className="w-3 h-3 rounded-sm shrink-0" style={{ background: groups.colorOf[g] }}></span>
                        <span className="text-slate-200">{g}</span>
                        <span className="ml-auto text-slate-500">{groups.counts[g] || 0}</span>
                      </button>
                      {hoverGroup === g && (
                        <div className="pointer-events-none absolute left-0 top-full mt-1 z-20
                                        w-64 rounded-md bg-slate-950 border border-slate-700 px-3 py-2
                                        text-[11px] leading-snug text-slate-200 shadow-xl">
                          {describe(g)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            )}

            <p className="text-[11px] leading-relaxed text-slate-500 border-t border-slate-800 pt-3">
              Точка — стаття; білі ★ — топ результати пошуку. Скрол — зум, перетягування — пан, наведення — назва.
            </p>
          </aside>

          <main className="flex-1 plot-wrap h-screen">
            <div ref={plotRef} className="w-full h-full"></div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
